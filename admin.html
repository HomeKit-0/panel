<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel - HomeKit</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Admin Panel</h1>

  <!-- Admin Login -->
  <label>Enter admin password: <input type="password" id="adminPass"></label>
  <button onclick="authAdmin()">Login</button>

  <!-- Admin Panel -->
  <div id="adminPanel" style="display:none">
    <h2>Manage Users</h2>
    <ul id="userList"></ul>

    <h3>Edit User Points</h3>
    <input type="text" id="editUser" placeholder="Username">
    <input type="number" id="editPoints" placeholder="New Points">
    <button onclick="updatePoints()">Update Points</button>
  </div>

  <script>
    const adminPassword = "changeme"; // Change this!

    async function loadUsers() {
      const res = await fetch("users.json");
      const users = await res.json();
      return users;
    }

    async function authAdmin() {
      const pass = document.getElementById("adminPass").value;
      if (pass === adminPassword) {
        document.getElementById("adminPanel").style.display = "block";
        const users = await loadUsers();
        const userList = document.getElementById("userList");
        userList.innerHTML = "";
        for (const user in users) {
          const li = document.createElement("li");
          li.innerText = `${user}: ${users[user].points} pts`;
          userList.appendChild(li);
        }
      } else {
        alert("Wrong password");
      }
    }

    async function updatePoints() {
      const username = document.getElementById("editUser").value.trim();
      const newPoints = parseInt(document.getElementById("editPoints").value);

      if (!username || isNaN(newPoints)) {
        alert("Please enter both username and a number for points.");
        return;
      }

      const response = await fetch(
        "https://api.github.com/repos/homekit-0/panel/actions/workflows/update-users.yml/dispatches",
        {
          method: "POST",
          headers: {
            "Authorization": "Bearer YOUR_PAT_HERE", // Replace with your PAT for testing
            "Accept": "application/vnd.github+json"
          },
          body: JSON.stringify({
            ref: "main",
            inputs: {
              username: username,
              newPoints: newPoints
            }
          })
        }
      );

      if (response.ok) {
        alert("User points update triggered. Wait a moment and refresh.");
      } else {
        const error = await response.text();
        console.error("Error:", error);
        alert("Failed to trigger update.");
      }
    }
  </script>
</body>
</html>
