<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Store - HomeKit</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Store</h1>
  <label>Username: <input type="text" id="storeUser"></label>

  </div>

  <script src="script.js"></script>
</body>
</html>
