name: Update User Points

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'Username to update'
        required: true
      newPoints:
        description: 'New points value'
        required: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Modify users.json
      run: |
        jq --arg user "${{ github.event.inputs.username }}" \
           --argjson pts "${{ github.event.inputs.newPoints }}" \
           '.[$user].points = $pts' users.json > tmp.json && mv tmp.json users.json

    - name: Commit and push
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add users.json
        git commit -m "Update points for ${{ github.event.inputs.username }}"
        git push
      env:
        GH_TOKEN: ${{ secrets.GH_PAT }}
